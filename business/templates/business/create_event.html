{% extends "business/base.html" %}
{% load static %}

{% block slider %}
<div class="breadcrumb-block style-shared">
    <div class="breadcrumb-main bg-linear overflow-hidden">
        <div class="container lg:pt-[134px] pt-24 pb-10 relative">
            <div class="main-content w-full h-full flex flex-col items-center justify-center relative z-[1]">
                <div class="text-content">
                    <div class="heading2 text-center">Create an Event</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock slider %}

{% block content %}
<div class='contact-us md:py-20 py-10'>
    <div class="container">
        <div class="flex justify-between max-lg:flex-col gap-y-10">
            <div class="left lg:w-2/3 lg:pr-4">
                <div class="heading3">Create your Event!</div>
                <div class="body1 text-secondary2 mt-3">Share your event details with the community!</div>
                <form class="md:mt-6 mt-4" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class='grid sm:grid-cols-2 grid-cols-1 gap-4 gap-y-5'>
                        <div class="name">
                            <label>Event Title *</label>
                            <input class="border-line px-4 py-3 w-full rounded-lg" id="event_title" placeholder="Event Title" type="text" name="title" required />
                        </div>
                        <div class="event-type select-block">
                            <label>Event Type *</label>
                            <select class="border border-line px-4 py-3 w-full rounded-lg" id="event_type" name="event_type" required>
                                <option value="">Select Event Type</option>
                                <option value="employment">Employment</option>
                                <option value="food">Food & Dining</option>
                                <option value="business">Business</option>
                                <option value="festival">Festival</option>
                                <option value="art">Art & Culture</option>
                                <option value="sport">Sport</option>
                                <option value="music">Music</option>
                                <option value="education">Education</option>
                                <option value="technology">Technology</option>
                                <option value="health">Health & Wellness</option>
                                <option value="other">Other</option>
                            </select>
                            <i class="ph-bold ph-caret-down arrow-down text-xl"></i>
                        </div>
                        <div class="image sm:col-span-2">
                            <label>Event Banner Image *</label>
                            <input class="border-line px-4 py-3 w-full rounded-lg" id="event_banner_image" type="file" name="banner_image" accept="image/*" required />
                        </div>
                        <div class="message sm:col-span-2">
                            <label>Event Description *</label>
                            <textarea class="border-line px-4 pt-3 pb-3 w-full rounded-lg" id="event_description" name="description" rows="3" placeholder="Describe your event..." required></textarea>
                        </div>
                        <div class="country select-block">
                            <label>Country *</label>
                            <select class="border border-line px-4 py-3 w-full rounded-lg" id="country" name="country" required>
                                <option value="">Select Country</option>
                                {% for country in countries %}
                                <option value="{{ country.id }}">{{ country.name }}</option>
                                {% endfor %}
                            </select>
                            <i class="ph-bold ph-caret-down arrow-down text-xl"></i>
                        </div>
                        <div class="state select-block">
                            <label>State *</label>
                            <select class="border border-line px-4 py-3 w-full rounded-lg" id="state" name="state" required>
                                <option value="">Select State</option>
                                {% for state in states %}
                                <option value="{{ state.id }}">{{ state.name }}</option>
                                {% endfor %}
                            </select>
                            <i class="ph-bold ph-caret-down arrow-down text-xl"></i>
                        </div>
                        <div class="date">
                            <label>Event Date & Time *</label>
                            <input class="border-line px-4 py-3 w-full rounded-lg" id="event_start_time" type="datetime-local" name="start_time" required />
                        </div>
                        <div class="location">
                            <label>Event Location *</label>
                            <input class="border-line px-4 py-3 w-full rounded-lg" id="event_location" type="text" name="location" placeholder="Enter location" required />
                        </div>
                        {% if request.user.is_staff %}
                        <div class="top-event sm:col-span-2">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" name="top_event" class="form-checkbox h-5 w-5">
                                <span>Mark as Top Event</span>
                            </label>
                        </div>
                        {% endif %}
                    </div>
                    <div class="block-button md:mt-6 mt-4">
                        <button type="submit" class="button-main sm:py-3 py-2 sm:px-5 px-4 bg-black hover:bg-green text-white rounded-full">Create Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
